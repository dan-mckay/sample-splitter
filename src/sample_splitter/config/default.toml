[splitter]
threshold_db = 20.0
min_gap_ms = 300
min_sample_ms = 100
head_pad_ms = 10
tail_pad_ms = 50

[naming]
review_threshold = 0.5

[taxonomy]
drums = ["kick", "snare", "hat", "tom", "cymbal", "perc"]
bass = ["sub", "synth", "picked"]
synth = ["stab", "pad", "lead"]
keys = ["piano", "organ", "ep"]
guitar = ["chord", "riff", "note"]
strings = ["stab", "sustain"]
vocal = ["phrase", "shout", "spoken"]
fx = ["riser", "impact", "noise", "ambience"]
beats = ["loop", "break", "fill"]
